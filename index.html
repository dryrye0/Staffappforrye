<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal - Closed</title>

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-danger: #ef4444;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 550px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
        }

        .error-code {
            font-family: monospace;
            font-size: 14px;
            color: var(--accent-danger);
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        h2 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .message-box {
            background-color: #7f1d1d33;
            border: 1px solid #f8717144;
            color: #f87171;
            padding: 20px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .contact-info {
            font-size: 14px;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .username-tag {
            background: #334155;
            color: #ffffff;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="error-code">ERR, CLOSED. 000</div>
    <h2>Applications Closed</h2>
    
    <div class="message-box">
        We are closed and not accepting applicants right now.
    </div>

    <div class="contact-info">
        Please contact the staff team, or the site's owner: <span class="username-tag">@dryrye</span> on Discord.
    </div>
</div>

</body></html>
